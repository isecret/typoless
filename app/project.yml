name: Typoless

options:
  bundleIdPrefix: com.isecret
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"

targets:
  Typoless:
    type: application
    platform: macOS
    sources:
      - path: Typoless
        excludes:
          - "**/.gitkeep"
          - "Resources/whisper"
    resources:
      - path: Typoless/Resources/whisper
        buildPhase: resources
        optional: true
    dependencies:
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isecret.typoless
        CODE_SIGN_ENTITLEMENTS: Typoless/Typoless.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Typoless
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Typoless 需要麦克风权限来进行语音输入"
    preBuildScripts:
      - name: "Validate Whisper Source Resources"
        script: |
          WHISPER_DIR="${SRCROOT}/Typoless/Resources/whisper"
          if [ ! -f "${WHISPER_DIR}/bin/whisper-cli" ]; then
            echo "error: Whisper CLI not found. Run ./scripts/setup-whisper.sh first."
            exit 1
          fi
          if [ ! -s "${WHISPER_DIR}/models/ggml-small.bin" ]; then
            echo "error: Whisper model not found. Run ./scripts/setup-whisper.sh first."
            exit 1
          fi
    postBuildScripts:
      - name: "Copy Whisper Resources and Fix Permissions"
        script: |
          WHISPER_SRC="${SRCROOT}/Typoless/Resources/whisper"
          WHISPER_DST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/whisper"
          if [ -d "${WHISPER_SRC}" ]; then
            mkdir -p "$(dirname "${WHISPER_DST}")"
            ditto "${WHISPER_SRC}" "${WHISPER_DST}"
          fi
          WHISPER_BIN="${WHISPER_DST}/bin/whisper-cli"
          if [ -f "${WHISPER_BIN}" ]; then
            chmod +x "${WHISPER_BIN}"
          fi
